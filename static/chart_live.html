<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Trading Bot — Live Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg:        #0b0e17;
    --surface:   #0f141f;
    --border:    #1a2535;
    --text:      #c8d8e8;
    --dim:       #556677;
    --green:     #00e676;
    --red:       #ff3352;
    --yellow:    #ffd700;
    --blue:      #3399ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Consolas', 'JetBrains Mono', monospace; font-size: 12px;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* --- Loading overlay ---------------------------------------------- */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 16px;
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading p { color: var(--dim); font-size: 13px; }
  #loading #load-status { color: var(--blue); font-size: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- Header ------------------------------------------------------ */
  #header-bar {
    padding: 6px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; flex-shrink: 0; gap: 16px; flex-wrap: wrap;
  }
  #chart-title { font-size: 13px; color: var(--yellow); letter-spacing: .04em;
                 font-weight: 600; white-space: nowrap; }
  .kv-group { display: flex; gap: 18px; flex-wrap: wrap; }
  .kv { display: flex; flex-direction: column; min-width: 70px; }
  .kv .k { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
  .kv .v { font-weight: bold; font-size: 13px; }
  .kv .v.pos { color: var(--green); }
  .kv .v.neg { color: var(--red); }
  .kv .v.yel { color: var(--yellow); }
  .kv .v.neu { color: var(--text); }

  #live-badge {
    margin-left: auto; padding: 2px 8px; border-radius: 12px; font-size: 10px;
    font-weight: 700; letter-spacing: .05em;
    background: rgba(255,51,82,.13); color: var(--red);
    border: 1px solid rgba(255,51,82,.33);
  }
  #live-badge.on { background: rgba(0,230,118,.13); color: var(--green);
                   border-color: rgba(0,230,118,.33); }

  /* --- Controls bar ------------------------------------------------ */
  #controls {
    padding: 4px 12px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
  }
  #controls label { font-size: 11px; color: var(--dim);
                    display: flex; align-items: center; gap: 4px; }
  #controls select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; padding: 2px 6px;
    font-size: 11px; cursor: pointer; font-family: inherit;
  }
  .tbtn {
    padding: 2px 9px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface); color: var(--dim); font-size: 11px;
    cursor: pointer; user-select: none; font-family: inherit;
  }
  .tbtn.on { background: #1a3a6b; border-color: var(--blue); color: #fff; }

  /* --- Layout ------------------------------------------------------ */
  #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  #charts-col { flex: 1; display: flex; flex-direction: column;
                overflow: hidden; min-width: 0; }
  #wrap-chart  { flex: 1; position: relative; min-height: 0; }
  #wrap-equity { flex: 0 0 120px; position: relative; border-top: 2px solid var(--border); }
  #chart, #echart { width: 100%; height: 100%; }
  .chart-lbl {
    position: absolute; top: 4px; left: 10px; font-size: 10px;
    color: var(--dim); z-index: 5; pointer-events: none;
  }

  /* --- uPnL badge (live during active position) -------------------- */
  #upnl-badge {
    position: absolute; top: 4px; right: 70px; z-index: 10;
    padding: 4px 10px; border-radius: 4px;
    background: rgba(15,20,31,.88); border: 1px solid var(--border);
    font-size: 13px; font-weight: bold; letter-spacing: .02em;
    display: none; pointer-events: none;
  }
  #upnl-badge.on  { display: block; }
  #upnl-badge.pos { color: var(--green); border-color: rgba(0,230,118,.45); }
  #upnl-badge.neg { color: var(--red);   border-color: rgba(255,51,82,.45); }
  #upnl-badge small { font-weight: normal; opacity: .75; margin-right: 4px; }

  /* --- Tooltip ----------------------------------------------------- */
  #tooltip {
    position: fixed; background: rgba(15,20,31,.92);
    border: 1px solid var(--border); padding: 7px 10px;
    pointer-events: none; display: none; z-index: 999;
    font-size: 11px; line-height: 1.65; border-radius: 6px; max-width: 230px;
  }
  #tooltip .tt-date { color: var(--yellow); font-weight: bold; margin-bottom: 3px; }
  #tooltip .tt-val  { color: var(--text); }

  /* --- Sidebar ----------------------------------------------------- */
  #side-panel {
    width: 300px; flex-shrink: 0; background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sb-hdr {
    padding: 6px 10px; font-size: 10px; font-weight: 700; letter-spacing: .06em;
    color: var(--blue); border-bottom: 1px solid var(--border);
    text-transform: uppercase; flex-shrink: 0;
  }
  #trade-detail { padding: 9px 10px; border-bottom: 1px solid var(--border);
                  flex-shrink: 0; min-height: 130px; }
  .trow { display: flex; justify-content: space-between; padding: 2px 0;
          border-bottom: 1px solid rgba(26,37,53,.4); font-size: 11px; }
  .trow .lbl { color: var(--dim); }
  .badge { display: inline-block; padding: 0 5px; border-radius: 2px; font-size: 10px; }
  .badge-LONG  { background: rgba(0,230,118,.12); color: var(--green); border: 1px solid var(--green); }
  .badge-SHORT { background: rgba(255,51,82,.12); color: var(--red);   border: 1px solid var(--red); }

  #trades-list { flex: 1 1 auto; overflow-y: auto;
                 scrollbar-width: thin; scrollbar-color: var(--border) var(--surface); }
  #trades-list::-webkit-scrollbar { width: 5px; }
  #trades-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  table.trade-table { width: 100%; border-collapse: collapse; }
  table.trade-table thead th {
    position: sticky; top: 0; background: #0d1420; color: var(--dim);
    padding: 5px 7px; font-weight: normal; text-align: right;
    border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 10px;
  }
  table.trade-table thead th:first-child { text-align: left; }
  table.trade-table tbody tr { cursor: pointer; transition: background .15s; }
  table.trade-table tbody tr:hover { background: rgba(255,255,255,.04); }
  table.trade-table tbody tr.selected { background: rgba(51,153,255,.12);
                                         border-left: 2px solid var(--blue); }
  table.trade-table td {
    padding: 4px 7px; text-align: right; font-size: 11px;
    border-bottom: 1px solid rgba(26,37,53,.6); white-space: nowrap;
  }
  table.trade-table td:first-child { text-align: left; }
  .dir-l { color: var(--green); font-weight: bold; }
  .dir-s { color: var(--red);   font-weight: bold; }
  .win  { color: var(--green); }
  .loss { color: var(--red);   }

  #total-row {
    flex-shrink: 0; padding: 8px 10px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: #0d1420;
  }
  #total-row .lbl { color: var(--dim); font-size: 11px; }
  #total-row .val { font-size: 13px; font-weight: bold; }
</style>
</head>
<body>

<!-- Loading overlay (ascuns dupa loadInit) -->
<div id="loading">
  <div class="spinner"></div>
  <p>Se incarca datele istorice...</p>
  <span id="load-status"></span>
</div>

<div id="header-bar">
  <div id="chart-title"><span id="title-text">loading…</span></div>
  <div class="kv-group">
    <div class="kv"><span class="k">Account</span><span class="v yel" id="hdr-account">—</span></div>
    <div class="kv"><span class="k">Return</span> <span class="v"     id="hdr-return">—</span></div>
    <div class="kv"><span class="k">uPnL</span>   <span class="v"     id="hdr-upnl">—</span></div>
    <div class="kv"><span class="k">Lista trade-uri</span> <span class="v"     id="hdr-trades">—</span></div>
    <div class="kv"><span class="k">Win %</span>  <span class="v"     id="hdr-wr">—</span></div>
    <div class="kv"><span class="k">Price</span>  <span class="v yel" id="hdr-price">—</span></div>
  </div>
  <span id="live-badge">● OFFLINE</span>
</div>

<div id="controls">
  <label>Dir: <select id="selDir">
    <option value="all">Toate</option>
    <option value="L">Long</option>
    <option value="S">Short</option>
  </select></label>
  <label>Motiv: <select id="selReason">
    <option value="all">Toate</option>
    <option value="TP">TP</option>
    <option value="SL">SL</option>
    <option value="EOD">EOD</option>
    <option value="MANUAL">Manual</option>
  </select></label>
  <button class="tbtn on" id="bEntry">Entries</button>
  <button class="tbtn on" id="bExit" >Exits</button>
  <button class="tbtn on" id="bSL"   >SL lines</button>
  <button class="tbtn on" id="bTP"   >TP lines</button>
</div>

<div id="main">
  <div id="charts-col">
    <div id="wrap-chart">
      <div class="chart-lbl" id="sym-lbl">loading…</div>
      <div id="upnl-badge"></div>
      <div id="chart"></div>
    </div>
    <div id="wrap-equity">
      <div class="chart-lbl">Equity ($)</div>
      <div id="echart"></div>
    </div>
  </div>
  <div id="side-panel">
    <div class="sb-hdr" id="detail-hdr">Fara pozitie activa</div>
    <div id="trade-detail">
      <div style="color:var(--dim);font-size:11px;padding:6px 0">
        Click pe un trade din lista
      </div>
    </div>
    <div class="sb-hdr">Istoric — <span id="trade-count">0</span></div>
    <div id="trades-list">
      <table class="trade-table">
        <thead>
          <tr><th>Data</th><th>Dir</th><th>PnL $</th></tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
    <div id="total-row">
      <span class="lbl">TOTAL (<span id="total-count">0</span>)</span>
      <span class="val" id="total-pnl">$0.00</span>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script>
'use strict';

// ============================================================================
// Config primit prin /api/init
// ============================================================================
let CHART_TZ = "Europe/Bucharest";
let BOT_NAME = "bot";
let STRATEGY = "";
let SYMBOL   = "BTCUSDT";
let INITIAL_ACCOUNT = 100.0;
let FIRST_TS = null;        // s UTC — afisam doar lumanari >= asta
let initDone = false;

// ============================================================================
// Bucharest formatters
// ============================================================================
function fmtDateTZ(tsSec) {
  const parts = new Intl.DateTimeFormat("ro-RO", {
    timeZone: CHART_TZ, weekday: "long",
    day: "2-digit", month: "2-digit", year: "numeric",
    hour: "2-digit", minute: "2-digit", hour12: false,
  }).formatToParts(new Date(tsSec * 1000));
  const m = {}; parts.forEach(p => m[p.type] = p.value);
  const wd = (m.weekday || "").replace(/^./, ch => ch.toUpperCase());
  return `${wd}, ${m.day}.${m.month}.${m.year}  ${m.hour}:${m.minute}`;
}
function fmtTimeTZ(tsSec) {
  const parts = new Intl.DateTimeFormat("en-GB", {
    timeZone: CHART_TZ, hour: "2-digit", minute: "2-digit", hour12: false,
  }).formatToParts(new Date(tsSec * 1000));
  const m = {}; parts.forEach(p => m[p.type] = p.value);
  return `${m.hour}:${m.minute}`;
}
function fmtShortDateTZ(tsSec) {
  const parts = new Intl.DateTimeFormat("en-GB", {
    timeZone: CHART_TZ, day: "2-digit", month: "2-digit", year: "numeric",
  }).formatToParts(new Date(tsSec * 1000));
  const m = {}; parts.forEach(p => m[p.type] = p.value);
  return `${m.day}.${m.month}.${m.year}`;
}

// ============================================================================
// Chart factory
// ============================================================================
const wrapChart  = document.getElementById("wrap-chart");
const wrapEquity = document.getElementById("wrap-equity");
const chartEl    = document.getElementById("chart");
const echartEl   = document.getElementById("echart");

function makeChart(el, interactive) {
  return LightweightCharts.createChart(el, {
    width: el.clientWidth, height: el.clientHeight,
    layout: { background: { color: "#0b0e17" }, textColor: "#556677" },
    grid:   { vertLines: { color: "#1a2535" }, horzLines: { color: "#1a2535" } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: "#1a2535" },
    timeScale: {
      timeVisible: true, secondsVisible: false, borderColor: "#1a2535",
      rightOffset: 10, barSpacing: 6,
      tickMarkFormatter: (time) => {
        const parts = new Intl.DateTimeFormat("en-GB", {
          timeZone: CHART_TZ,
          hour: "2-digit", minute: "2-digit", hour12: false,
          day: "2-digit", month: "2-digit"
        }).formatToParts(new Date(time * 1000));
        const m = {}; parts.forEach(p => m[p.type] = p.value);
        if (m.hour === "00" && m.minute === "00") return `${m.day}/${m.month}`;
        return `${m.hour}:${m.minute}`;
      }
    },
    localization: { timeFormatter: ts => fmtDateTZ(ts) },
    handleScroll: interactive, handleScale: interactive,
  });
}

const chart  = makeChart(chartEl,  true);
const echart = makeChart(echartEl, false);

const candleSeries = chart.addCandlestickSeries({
  upColor:         "#00e676", downColor:       "#ff3352",
  borderUpColor:   "#00e676", borderDownColor: "#ff3352",
  wickUpColor:     "#00e676", wickDownColor:   "#ff3352",
});
const equitySeries = echart.addAreaSeries({
  lineColor: "#3399ff",
  topColor: "rgba(51,153,255,0.33)", bottomColor: "rgba(51,153,255,0)",
  lineWidth: 2, priceFormat: { type: "price", precision: 2, minMove: 0.01 }
});

const _ro = new ResizeObserver(() => {
  const r = chart.timeScale().getVisibleRange();
  chart.resize(chartEl.clientWidth, wrapChart.clientHeight);
  echart.resize(echartEl.clientWidth, wrapEquity.clientHeight);
  if (r) requestAnimationFrame(() => chart.timeScale().setVisibleRange(r));
});
_ro.observe(wrapChart);
_ro.observe(wrapEquity);

// ============================================================================
// Indicator series
// ============================================================================
const indicatorSeries = new Map();
let indicatorMeta = {};

function getOrCreateIndicator(name) {
  let s = indicatorSeries.get(name);
  if (s) return s;
  const m = indicatorMeta[name] || {};
  s = chart.addLineSeries({
    color:      m.color     || "#ffd700",
    lineWidth:  m.lineWidth || 1,
    lineStyle:  m.lineStyle || 0,
    priceLineVisible: false, lastValueVisible: true, title: name,
    crosshairMarkerVisible: false,
  });
  indicatorSeries.set(name, s);
  return s;
}
function setIndicatorData(name, points) {
  getOrCreateIndicator(name).setData(points.map(p => ({ time: p.time, value: p.value })));
}
function updateIndicator(name, time, value) {
  getOrCreateIndicator(name).update({ time: time, value: value });
}

// ============================================================================
// State local
// ============================================================================
let CANDLES = [];               // [{time,open,high,low,close}]
const trades = [];              // toate trade-urile (init + live)
let activePosition = null;      // {direction, entry, sl, tp, qty?, risk_usd?}
let selectedTradeId = null;
let lastPrice = 0;

// Price lines pentru pozitia ACTIVA (live, in timpul trade-ului)
let liveSlLine = null, liveTpLine = null, liveEntryLine = null;
// Price lines pentru trade-ul SELECTAT din istoric (pe click)
let slLine = null, tpLine = null, entryLine = null;
// Bounded line series (SL/TP pe durata trade-urilor istorice)
let slBoundedSer = null, tpBoundedSer = null;

// ============================================================================
// Live position lines (Entry / SL / TP)
// ============================================================================
function clearLiveLines() {
  if (liveSlLine)    { candleSeries.removePriceLine(liveSlLine);    liveSlLine = null; }
  if (liveTpLine)    { candleSeries.removePriceLine(liveTpLine);    liveTpLine = null; }
  if (liveEntryLine) { candleSeries.removePriceLine(liveEntryLine); liveEntryLine = null; }
}
function showLiveLines(p) {
  clearLiveLines();
  const entryColor = p.direction === "LONG" ? "#00e676" : "#ff3352";
  liveEntryLine = candleSeries.createPriceLine({
    price: p.entry, color: entryColor, lineWidth: 2, lineStyle: 0,
    axisLabelVisible: true, title: `LIVE ${p.direction}`
  });
  liveSlLine = candleSeries.createPriceLine({
    price: p.sl, color: "#ff3352", lineWidth: 2, lineStyle: 0,
    axisLabelVisible: true, title: "LIVE SL"
  });
  liveTpLine = candleSeries.createPriceLine({
    price: p.tp, color: "#00e676", lineWidth: 2, lineStyle: 0,
    axisLabelVisible: true, title: "LIVE TP"
  });
}

// ============================================================================
// Selected trade lines (Entry / SL / TP — pe click in lista)
// ============================================================================
function clearSelLines() {
  if (slLine)    { candleSeries.removePriceLine(slLine);    slLine = null; }
  if (tpLine)    { candleSeries.removePriceLine(tpLine);    tpLine = null; }
  if (entryLine) { candleSeries.removePriceLine(entryLine); entryLine = null; }
}
function showSelLines(t) {
  clearSelLines();
  entryLine = candleSeries.createPriceLine({
    price: t.entry_price, color: "#ffd700", lineWidth: 1, lineStyle: 2,
    axisLabelVisible: true, title: `Entry #${t.id} ${t.size_usdt.toFixed(0)}$`
  });
  if (t.sl) slLine = candleSeries.createPriceLine({
    price: t.sl, color: "#ff3352", lineWidth: 1, lineStyle: 2,
    axisLabelVisible: true, title: "SL"
  });
  if (t.tp) tpLine = candleSeries.createPriceLine({
    price: t.tp, color: "#00e676", lineWidth: 1, lineStyle: 2,
    axisLabelVisible: true, title: "TP"
  });
}

// ============================================================================
// Bounded SL/TP series (linii afisate doar in intervalul fiecarui trade)
// ============================================================================
function makeBoundedLine(color) {
  return chart.addLineSeries({
    color, lineWidth: 1, lineStyle: 2,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
}
function buildBounded(filteredTrades) {
  if (slBoundedSer) { try { chart.removeSeries(slBoundedSer); } catch(e){} slBoundedSer = null; }
  if (tpBoundedSer) { try { chart.removeSeries(tpBoundedSer); } catch(e){} tpBoundedSer = null; }
  if (!filteredTrades.length || !CANDLES.length) return;
  const showSL = document.getElementById("bSL").classList.contains("on");
  const showTP = document.getElementById("bTP").classList.contains("on");
  if (!showSL && !showTP) return;

  const srt = filteredTrades
    .filter(t => t.entry_ms && t.exit_ms && (t.sl || t.tp))
    .sort((a, b) => a.entry_ms - b.entry_ms);
  if (!srt.length) return;

  const slD = [], tpD = [];
  let ti = 0;
  for (let i = 0; i < CANDLES.length; i++) {
    const ts = CANDLES[i].time, tsMs = ts * 1000;
    while (ti < srt.length - 1 && srt[ti].exit_ms < tsMs) ti++;
    const t = srt[ti];
    const inside = tsMs >= t.entry_ms && tsMs <= t.exit_ms;
    if (showSL && t.sl) slD.push(inside ? { time: ts, value: t.sl } : { time: ts });
    if (showTP && t.tp) tpD.push(inside ? { time: ts, value: t.tp } : { time: ts });
  }
  if (showSL && slD.length) { slBoundedSer = makeBoundedLine("#ff335288"); slBoundedSer.setData(slD); }
  if (showTP && tpD.length) { tpBoundedSer = makeBoundedLine("#00e67688"); tpBoundedSer.setData(tpD); }
}

// ============================================================================
// Markers (entries + exits)
// ============================================================================
function buildMarkers(filteredTrades) {
  const showE = document.getElementById("bEntry").classList.contains("on");
  const showX = document.getElementById("bExit").classList.contains("on");
  const mk = [];
  filteredTrades.forEach(t => {
    if (showE && t.entry_ms) {
      mk.push({
        time: Math.floor(t.entry_ms / 1000),
        position: t.side === "L" ? "belowBar" : "aboveBar",
        color:    t.side === "L" ? "#00e676"  : "#ff3352",
        shape:    t.side === "L" ? "arrowUp"  : "arrowDown",
        text: `${t.side} $${t.size_usdt.toFixed(0)}`, size: 2,
      });
    }
    if (showX && t.exit_ms) {
      mk.push({
        time: Math.floor(t.exit_ms / 1000),
        position: t.pnl >= 0 ? "aboveBar" : "belowBar",
        color:    t.pnl >= 0 ? "#3399ff"  : "#888888",
        shape:    "circle", size: 2,
        text: t.pnl >= 0 ? "✔" : "✘",
      });
    }
  });
  mk.sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(mk);
}

// ============================================================================
// Filters + render
// ============================================================================
function filteredTrades() {
  const dir = document.getElementById("selDir").value;
  const rsn = document.getElementById("selReason").value;
  return trades.filter(t => {
    if (dir !== "all" && t.side !== dir) return false;
    if (rsn !== "all" && t.exit_reason !== rsn) return false;
    return true;
  });
}
function render() {
  const saved = initDone ? chart.timeScale().getVisibleRange() : null;
  const f = filteredTrades();
  buildBounded(f);
  buildMarkers(f);
  renderList(f);
  if (saved) requestAnimationFrame(() => chart.timeScale().setVisibleRange(saved));
}

// ============================================================================
// Trade list + detail panel
// ============================================================================
function renderList(filteredTrades) {
  const tbody = document.getElementById("tbl-body");
  tbody.innerHTML = "";
  document.getElementById("trade-count").textContent = filteredTrades.length;
  document.getElementById("total-count").textContent = filteredTrades.length;
  [...filteredTrades].reverse().forEach(t => {
    const ts = Math.floor(t.entry_ms / 1000);
    const dateStr = `${fmtShortDateTZ(ts)}<br><span style="color:var(--dim)">${fmtTimeTZ(ts)}</span>`;
    const pnlClass = t.pnl >= 0 ? "win" : "loss";
    const dirClass = t.side === "L" ? "dir-l" : "dir-s";
    const pnlSign  = t.pnl >= 0 ? "+" : "";
    const exMark   = t.exit_reason === "TP" ? " ✓"
                  : t.exit_reason === "SL" ? " ✗" : "";
    const tr = document.createElement("tr");
    if (selectedTradeId === t.id) tr.classList.add("selected");
    tr.innerHTML =
      `<td style="font-size:10px;line-height:1.3">${dateStr}</td>` +
      `<td class="${dirClass}">${t.side}</td>` +
      `<td class="${pnlClass}">${pnlSign}${t.pnl.toFixed(2)}${exMark}</td>`;
    tr.onclick = () => selectTrade(t);
    tbody.appendChild(tr);
  });
}
function selectTrade(t) {
  selectedTradeId = t.id;
  renderList(filteredTrades());
  showSelLines(t);
  renderDetail(t, false);
  const entryS = Math.floor(t.entry_ms / 1000);
  const exitS  = t.exit_ms ? Math.floor(t.exit_ms / 1000) : entryS;
  chart.timeScale().setVisibleRange({
    from: entryS - 3600, to: exitS + 3600,
  });
}

function renderDetail(t, isActive) {
  const hdr = document.getElementById("detail-hdr");
  const el  = document.getElementById("trade-detail");
  if (!t) {
    hdr.textContent = "Fara pozitie activa";
    el.innerHTML = '<div style="color:var(--dim);font-size:11px;padding:6px 0">Click pe un trade din lista</div>';
    return;
  }
  hdr.textContent = isActive ? "Pozitie ACTIVA" : `Trade Selectat #${t.id}`;
  const dir = isActive ? t.direction : (t.side === "L" ? "LONG" : "SHORT");
  const badge = `<span class="badge badge-${dir}">${dir}</span>`;
  let rows = `<div class="trow"><span class="lbl">Dir</span>${badge}</div>`;
  if (isActive) {
    rows +=
      `<div class="trow"><span class="lbl">Entry</span><span>${t.entry.toFixed(4)}</span></div>` +
      `<div class="trow"><span class="lbl">SL</span><span class="loss">${t.sl.toFixed(4)}</span></div>` +
      `<div class="trow"><span class="lbl">TP</span><span class="win">${t.tp.toFixed(4)}</span></div>`;
    if (t.qty)      rows += `<div class="trow"><span class="lbl">Qty</span><span>${t.qty}</span></div>`;
    if (t.risk_usd) rows += `<div class="trow"><span class="lbl">Risk</span><span>${t.risk_usd.toFixed(2)}$</span></div>`;
  } else {
    const entryDt = fmtDateTZ(Math.floor(t.entry_ms / 1000));
    const exitDt  = t.exit_ms ? fmtDateTZ(Math.floor(t.exit_ms / 1000)) : "—";
    const pnlCls  = t.pnl >= 0 ? "win" : "loss";
    const pnlSig  = t.pnl >= 0 ? "+" : "";
    rows +=
      `<div class="trow"><span class="lbl">Entry</span><span>${t.entry_price.toFixed(4)}</span></div>` +
      `<div class="trow"><span class="lbl">SL</span><span class="loss">${t.sl ? t.sl.toFixed(4) : '—'}</span></div>` +
      `<div class="trow"><span class="lbl">TP</span><span class="win">${t.tp ? t.tp.toFixed(4) : '—'}</span></div>` +
      `<div class="trow"><span class="lbl">Size</span><span>${t.size_usdt.toFixed(2)}$</span></div>` +
      `<div class="trow"><span class="lbl">Open</span><span>${entryDt}</span></div>` +
      `<div class="trow"><span class="lbl">Exit (${t.exit_reason})</span><span>${t.exit_price.toFixed(4)} @ ${exitDt}</span></div>` +
      `<div class="trow"><span class="lbl">PnL</span><span class="${pnlCls}">${pnlSig}${t.pnl.toFixed(2)}$</span></div>`;
  }
  el.innerHTML = rows;
}

// ============================================================================
// Live unrealized PnL (badge + header)
// ============================================================================
function updateOpenPnl(price) {
  const el = document.getElementById("hdr-upnl");
  const badge = document.getElementById("upnl-badge");
  if (!activePosition || !price) {
    el.textContent = "—"; el.className = "v neu";
    badge.className = "";
    return;
  }
  const p = activePosition;
  const diff = p.direction === "LONG" ? (price - p.entry) : (p.entry - price);
  // uPnL in $ — necesita qty (size in coin); altfel afisam doar % din entry
  let pnlUsd = null;
  if (p.qty) {
    pnlUsd = diff * p.qty;
  } else if (p.entry) {
    // Fallback fara qty: afiseaza PnL ca % din entry, nu ca $.
    pnlUsd = (diff / p.entry) * 100;
  }
  if (pnlUsd === null) { el.textContent = "—"; el.className = "v neu"; badge.className = ""; return; }
  const cls  = pnlUsd >= 0 ? "pos" : "neg";
  const sign = pnlUsd >= 0 ? "+" : "";
  el.className = "v " + cls;
  if (p.qty) {
    el.textContent = sign + pnlUsd.toFixed(4) + "$";
    badge.className = "on " + cls;
    let badgeHtml = "<small>uPnL</small>" + sign + pnlUsd.toFixed(4) + "$";
    if (p.risk_usd) {
      const rMul = pnlUsd / p.risk_usd;
      badgeHtml += " <small>(" + (rMul >= 0 ? "+" : "") + rMul.toFixed(2) + "R)</small>";
    }
    badge.innerHTML = badgeHtml;
  } else {
    el.textContent = sign + pnlUsd.toFixed(2) + "%";
    badge.className = "on " + cls;
    badge.innerHTML = "<small>uPnL</small>" + sign + pnlUsd.toFixed(2) + "%";
  }
}

// ============================================================================
// Header summary
// ============================================================================
function updateSummary(s) {
  document.getElementById("hdr-account").textContent = "$" + s.account.toFixed(2);
  const retEl = document.getElementById("hdr-return");
  retEl.textContent = (s.return_pct >= 0 ? "+" : "") + s.return_pct.toFixed(2) + "%";
  retEl.className = "v " + (s.return_pct >= 0 ? "pos" : "neg");
  document.getElementById("hdr-trades").textContent = s.n_trades;
  document.getElementById("hdr-wr").textContent     = s.win_rate.toFixed(1) + "%";

  const totEl = document.getElementById("total-pnl");
  const pnl   = s.pnl_total;
  totEl.textContent = (pnl >= 0 ? "+" : "") + "$" + pnl.toFixed(2) +
                      " (" + (s.return_pct >= 0 ? "+" : "") + s.return_pct.toFixed(2) + "%)";
  totEl.style.color = pnl >= 0 ? "#00e676" : "#ff3352";
}

// ============================================================================
// Tooltip floating
// ============================================================================
chart.subscribeCrosshairMove(p => {
  const tip = document.getElementById("tooltip");
  if (!p.point || !p.time) { tip.style.display = "none"; return; }
  const d = p.seriesData.get(candleSeries);
  if (!d) { tip.style.display = "none"; return; }
  const ts = p.time;
  const tr = trades.find(t =>
    Math.floor(t.entry_ms / 1000) === ts ||
    (t.exit_ms && Math.floor(t.exit_ms / 1000) === ts));
  let extra = "";
  if (tr) {
    const win = tr.pnl >= 0;
    const dirCls = tr.side === "L" ? "dir-l" : "dir-s";
    extra =
      '<div style="border-top:1px solid #1a2535;margin-top:4px;padding-top:4px">' +
      `<span class="${dirCls}">#${tr.id} ${tr.side === "L" ? "LONG" : "SHORT"}</span>` +
      ` • ${tr.exit_reason}<br/>` +
      `Entry ${tr.entry_price.toFixed(4)} → SL ${tr.sl ? tr.sl.toFixed(4) : '—'}<br/>` +
      `PnL <span class="${win ? "win" : "loss"}">${win ? "+" : ""}${tr.pnl.toFixed(2)}$</span>` +
      "</div>";
  }
  const rect = chartEl.getBoundingClientRect();
  const left = p.point.x < rect.width * 0.55
              ? rect.left + p.point.x + 14
              : rect.left + p.point.x - 240;
  tip.innerHTML =
    `<div class="tt-date">${fmtDateTZ(ts)}</div>` +
    `O:<b>${d.open.toFixed(2)}</b> H:<b style="color:#00e676">${d.high.toFixed(2)}</b><br/>` +
    `L:<b style="color:#ff3352">${d.low.toFixed(2)}</b> C:<b>${d.close.toFixed(2)}</b>` +
    extra;
  tip.style.display = "block";
  tip.style.left = left + "px";
  tip.style.top  = (rect.top + p.point.y - 10) + "px";
});

// ============================================================================
// Controls
// ============================================================================
["selDir", "selReason"].forEach(id =>
  document.getElementById(id).addEventListener("change", render));
["bEntry", "bExit", "bSL", "bTP"].forEach(id =>
  document.getElementById(id).addEventListener("click", function() {
    this.classList.toggle("on");
    render();
  }));

// ============================================================================
// /api/init
// ============================================================================
async function loadInit() {
  const status = document.getElementById("load-status");
  status.textContent = "Se descarca snapshot-ul...";
  const r = await fetch("/api/init");
  const data = await r.json();

  CHART_TZ        = data.timezone || "Europe/Bucharest";
  BOT_NAME        = data.bot_name || "bot";
  STRATEGY        = data.strategy || "";
  SYMBOL          = data.symbol   || "BTCUSDT";
  INITIAL_ACCOUNT = data.summary.initial_account;
  FIRST_TS        = data.first_ts;

  const titleLabel = STRATEGY ? `[${BOT_NAME} · ${STRATEGY}]` : `[${BOT_NAME}]`;
  document.title = `${titleLabel} ${SYMBOL}`;
  document.getElementById("title-text").textContent = `${titleLabel} ${SYMBOL} — live`;
  document.getElementById("sym-lbl").textContent    = `${SYMBOL} · live · ${CHART_TZ}`;

  // Candles
  CANDLES = (data.candles || []).map(c => ({
    time: c[0], open: c[1], high: c[2], low: c[3], close: c[4]
  }));
  if (CANDLES.length) {
    candleSeries.setData(CANDLES);
    lastPrice = CANDLES[CANDLES.length - 1].close;
    document.getElementById("hdr-price").textContent = lastPrice.toFixed(2);
  }

  // Equity
  if ((data.equity || []).length) {
    equitySeries.setData(data.equity);
  }

  // Indicators
  indicatorMeta = data.indicator_meta || {};
  for (const [name, points] of Object.entries(data.indicators || {})) {
    if (points && points.length) setIndicatorData(name, points);
  }

  // Trades
  (data.trades || []).forEach(t => trades.push(t));
  updateSummary(data.summary);

  // Active position (linii LIVE + uPnL)
  if (data.active_position) {
    activePosition = data.active_position;
    showLiveLines(activePosition);
    renderDetail(activePosition, true);
    updateOpenPnl(lastPrice);
  }

  // Build markers + bounded series + sidebar list
  render();
  initDone = true;
  chart.timeScale().scrollToRealTime();

  document.getElementById("loading").style.display = "none";
}

// ============================================================================
// WebSocket
// ============================================================================
function connectWS() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws    = new WebSocket(`${proto}://${location.host}/ws`);
  const badge = document.getElementById("live-badge");

  ws.onopen = () => {
    badge.classList.add("on");
    badge.textContent = "● LIVE";
    setInterval(() => { try { ws.send("ping"); } catch(e){} }, 20000);
  };
  ws.onclose = () => {
    badge.classList.remove("on");
    badge.textContent = "● DECONECTAT";
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => { try { ws.close(); } catch(e){} };

  ws.onmessage = ev => {
    const msg = JSON.parse(ev.data);

    if (msg.type === "candle") {
      const c = msg.data;
      if (FIRST_TS === null) FIRST_TS = c.time;
      if (c.time < FIRST_TS) return;

      candleSeries.update({
        time: c.time, open: c.open, high: c.high, low: c.low, close: c.close
      });
      // Mentine CANDLES sincronizat (pentru bounded SL/TP la urmatoarele
      // re-render-uri)
      if (CANDLES.length && CANDLES[CANDLES.length - 1].time === c.time) {
        CANDLES[CANDLES.length - 1] = c;
      } else {
        CANDLES.push(c);
        if (CANDLES.length > 20000) CANDLES.shift();
      }
      lastPrice = c.close;
      document.getElementById("hdr-price").textContent = c.close.toFixed(2);
      updateOpenPnl(c.close);

    } else if (msg.type === "trade_closed") {
      trades.push(msg.trade);
      // Live position dispare la close
      activePosition = null;
      clearLiveLines();
      renderDetail(null, false);
      updateOpenPnl(0);
      // Equity
      if (msg.equity) equitySeries.update(msg.equity);
      updateSummary(msg.summary);
      render();
      // Highlight ultimul rand
      const lastRow = document.querySelector("#tbl-body tr:first-child");
      if (lastRow) {
        lastRow.style.transition = "background 1.5s";
        lastRow.style.background = "rgba(255,215,0,0.2)";
        setTimeout(() => { lastRow.style.background = ""; }, 1500);
      }

    } else if (msg.type === "indicator") {
      updateIndicator(msg.name, msg.time, msg.value);

    } else if (msg.type === "position_open") {
      activePosition = {
        direction: msg.direction, entry: msg.entry, sl: msg.sl, tp: msg.tp,
        qty: msg.qty, risk_usd: msg.risk_usd,
      };
      showLiveLines(activePosition);
      renderDetail(activePosition, true);
      updateOpenPnl(lastPrice);

    } else if (msg.type === "position_close") {
      activePosition = null;
      clearLiveLines();
      renderDetail(null, false);
      updateOpenPnl(0);
    }
  };
}

// ============================================================================
// Init
// ============================================================================
loadInit().then(connectWS).catch(err => {
  console.error("init failed:", err);
  document.getElementById("load-status").textContent = "Eroare: " + err.message;
});
</script>
